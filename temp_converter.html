<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="card">
  <h1>🌡️ Temp Converter</h1>
  <p class="subtitle">Science Classroom Edition</p>

  <div class="field">
    <label>Celsius (°C)</label>
    <input type="number" id="celsius" placeholder="e.g. 100" />
  </div>

  <div class="divider">
    <hr><span>⇅</span><hr>
  </div>

  <div class="field">
    <label>Fahrenheit (°F)</label>
    <input type="number" id="fahrenheit" placeholder="e.g. 212" />
  </div>

  <button class="btn-reset">↺ Reset</button>

  <div class="references">
    <div class="ref-item">
      <div class="ref-label">Freezing Point</div>
      <div class="ref-val">0°C = 32°F</div>
    </div>
    <div class="ref-item">
      <div class="ref-label">Boiling Point</div>
      <div class="ref-val">100°C = 212°F</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
